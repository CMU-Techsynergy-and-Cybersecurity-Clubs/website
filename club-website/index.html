<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Colorado Mesa University Tech Clubs - Cybersecurity Club and TechSynergy Club" />
    <title>CMU Tech Clubs - Cybersecurity & TechSynergy</title>

    <!-- SPA GitHub Pages support -->
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          const decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
